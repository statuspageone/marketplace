# Authentication strategy - one of: oauth, apiKey, bearer, webhook_url, none
strategy: oauth

# OAuth configuration
oauth:
  authorizationUrl: https://example.com/oauth/authorize
  tokenUrl: https://example.com/oauth/token
  scopes:
    - events.read
    - events.write
  # Environment variables for OAuth credentials (set during installation)
  clientIdEnvVar: SP1_EXAMPLE_CLIENT_ID
  clientSecretEnvVar: SP1_EXAMPLE_CLIENT_SECRET
