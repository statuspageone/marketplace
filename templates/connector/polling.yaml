# API endpoint to poll for events
endpoint: https://api.example.com/incidents

# JSON path to array of items in response
itemsPath: data.items

# Field name used for cursor-based pagination
cursorField: updated_at

# Pagination configuration
pagination:
  type: cursor  # or: offset, page
  nextCursorPath: data.next_cursor

# Path to fixture file containing example API response
fixturePath: fixtures/polling-page.json
