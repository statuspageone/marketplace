events:
  - sourceEvent: cloudwatch.alarm.open
    fieldMappings:
      provider: { literal: cloudwatch }
      provider_event_type: { sourcePath: NewStateValue }
      status: { literal: open }
      severity: { literal: high }
      title: { sourcePath: AlarmName }
      description: { sourcePath: AlarmDescription }
      resource_type: { literal: alarm }
      resource_id: { sourcePath: AlarmArn }
      resource_name: { sourcePath: AlarmName }
      occurred_at: { sourcePath: StateChangeTime }
  - sourceEvent: cloudwatch.alarm.resolved
    fieldMappings:
      provider: { literal: cloudwatch }
      provider_event_type: { sourcePath: NewStateValue }
      status: { literal: resolved }
      severity: { literal: info }
      title: { sourcePath: AlarmName }
      description: { sourcePath: AlarmDescription }
      resource_type: { literal: alarm }
      resource_id: { sourcePath: AlarmArn }
      resource_name: { sourcePath: AlarmName }
      occurred_at: { sourcePath: StateChangeTime }
