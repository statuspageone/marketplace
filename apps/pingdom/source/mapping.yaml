events:
  - sourceEvent: pingdom.check.down
    fieldMappings:
      provider: { literal: pingdom }
      provider_event_type: { sourcePath: current_state }
      status: { literal: open }
      severity: { literal: high }
      title: { sourcePath: check_name }
      description: { sourcePath: long_description }
      resource_type: { literal: check }
      resource_id: { sourcePath: check_id }
      resource_name: { sourcePath: check_name }
      occurred_at: { sourcePath: state_changed_utc_time }
  - sourceEvent: pingdom.check.up
    fieldMappings:
      provider: { literal: pingdom }
      provider_event_type: { sourcePath: current_state }
      status: { literal: resolved }
      severity: { literal: info }
      title: { sourcePath: check_name }
      description: { sourcePath: long_description }
      resource_type: { literal: check }
      resource_id: { sourcePath: check_id }
      resource_name: { sourcePath: check_name }
      occurred_at: { sourcePath: state_changed_utc_time }
