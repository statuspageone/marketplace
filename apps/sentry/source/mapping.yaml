events:
  - sourceEvent: sentry.issue.open
    fieldMappings:
      provider: { literal: sentry }
      provider_event_type: { sourcePath: action }
      status: { literal: open }
      severity: { literal: high }
      title: { sourcePath: data.issue.title }
      description: { sourcePath: data.issue.culprit }
      resource_type: { literal: issue }
      resource_id: { sourcePath: data.issue.id }
      resource_name: { sourcePath: data.issue.shortId }
      service_name: { sourcePath: data.issue.project.slug }
      source_url: { sourcePath: data.issue.permalink }
      occurred_at: { sourcePath: data.issue.lastSeen }
  - sourceEvent: sentry.issue.resolved
    fieldMappings:
      provider: { literal: sentry }
      provider_event_type: { sourcePath: action }
      status: { literal: resolved }
      severity: { literal: info }
      title: { sourcePath: data.issue.title }
      description: { sourcePath: data.issue.culprit }
      resource_type: { literal: issue }
      resource_id: { sourcePath: data.issue.id }
      resource_name: { sourcePath: data.issue.shortId }
      service_name: { sourcePath: data.issue.project.slug }
      source_url: { sourcePath: data.issue.permalink }
      occurred_at: { sourcePath: data.issue.lastSeen }
