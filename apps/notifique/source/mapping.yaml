events:
  - sourceEvent: message.sent
    description: Notifique message sent event mapped into the normalized source-event contract.
    fieldMappings:
      provider:
        literal: notifique
      provider_event_type:
        sourcePath: event
      status:
        literal: open
      severity:
        literal: low
      title:
        sourcePath: event
      resource_id:
        sourcePath: messageId
      resource_name:
        sourcePath: data.to
      occurred_at:
        sourcePath: timestamp
      description:
        sourcePath: data.status
  - sourceEvent: message.delivered
    description: Notifique delivery event mapped into the normalized source-event contract.
    fieldMappings:
      provider:
        literal: notifique
      provider_event_type:
        sourcePath: event
      status:
        literal: acknowledged
      severity:
        literal: low
      title:
        sourcePath: event
      resource_id:
        sourcePath: messageId
      resource_name:
        sourcePath: data.to
      occurred_at:
        sourcePath: timestamp
      description:
        sourcePath: data.status
  - sourceEvent: message.failed
    description: Notifique failure event mapped into the normalized source-event contract.
    fieldMappings:
      provider:
        literal: notifique
      provider_event_type:
        sourcePath: event
      status:
        literal: resolved
      severity:
        literal: medium
      title:
        sourcePath: event
      resource_id:
        sourcePath: messageId
      resource_name:
        sourcePath: data.to
      occurred_at:
        sourcePath: timestamp
      description:
        sourcePath: data.status
