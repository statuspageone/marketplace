events:
  - sourceEvent: solarwinds-npm.alert.open
    fieldMappings:
      provider: { literal: solarwinds-npm }
      provider_event_type: { sourcePath: AlertSeverity }
      status: { literal: open }
      severity: { literal: high }
      title: { sourcePath: AlertName }
      description: { sourcePath: AlertMessage }
      resource_type: { literal: alert }
      resource_name: { sourcePath: NetworkObjectName }
      source_url: { sourcePath: AlertUrl }
      occurred_at: { sourcePath: AlertTriggerTime }
  - sourceEvent: solarwinds-npm.alert.resolved
    fieldMappings:
      provider: { literal: solarwinds-npm }
      provider_event_type: { sourcePath: AlertSeverity }
      status: { literal: resolved }
      severity: { literal: info }
      title: { sourcePath: AlertName }
      description: { sourcePath: AlertMessage }
      resource_type: { literal: alert }
      resource_name: { sourcePath: NetworkObjectName }
      source_url: { sourcePath: AlertUrl }
      occurred_at: { sourcePath: AlertResetTime }
