events:
  - sourceEvent: newrelic.incident.open
    fieldMappings:
      provider: { literal: newrelic }
      provider_event_type: { sourcePath: state }
      status: { literal: open }
      severity: { literal: high }
      title: { sourcePath: title }
      resource_type: { literal: incident }
      resource_id: { sourcePath: id }
      resource_name: { sourcePath: title }
      source_url: { sourcePath: issueUrl }
      occurred_at: { sourcePath: createdAt }
  - sourceEvent: newrelic.incident.resolved
    fieldMappings:
      provider: { literal: newrelic }
      provider_event_type: { sourcePath: state }
      status: { literal: resolved }
      severity: { literal: info }
      title: { sourcePath: title }
      resource_type: { literal: incident }
      resource_id: { sourcePath: id }
      resource_name: { sourcePath: title }
      source_url: { sourcePath: issueUrl }
      occurred_at: { sourcePath: updatedAt }
